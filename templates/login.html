<!DOCTYPE html>
<html>
<head>
<title>SentinelShield Login</title>

<style>

body{
background:#001f73;
font-family:Arial;
}

.login-box{
width:350px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#00ffff;
border:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login-box">

<h1>SentinelShield Login</h1>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
